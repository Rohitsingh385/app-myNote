<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R Notes — Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F7F4EF;
      --surface: #FFFFFF;
      --border: rgba(0, 0, 0, 0.08);
      --border-md: rgba(0, 0, 0, 0.14);
      --text: #1A1917;
      --muted: #7A7672;
      --hint: #B5B0AA;
      --accent: #5B47E0;
      --accent-lt: #EEEDFE;
      --accent-hover: #4738C7;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── card ── */
    .card {
      position: relative;
      background: var(--surface);
      border-radius: 28px;
      border: 0.5px solid var(--border-md);
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
      animation: cardIn 0.5s cubic-bezier(0.34, 1.20, 0.64, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-dot {
      width: 32px;
      height: 32px;
      background: var(--accent-lt);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-dot svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-name {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    /* ── heading ── */
    .heading {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 30px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      line-height: 1.1;
    }

    .subheading {
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── form ── */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      background: #FAFAF8;
      border: 1px solid var(--border-md);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: var(--hint);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(91, 71, 224, 0.10);
      background: var(--surface);
    }

    /* ── forgot ── */
    .forgot {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      margin-bottom: 24px;
    }

    .forgot a {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 400;
      transition: opacity 0.2s;
    }

    .forgot a:hover {
      opacity: 0.7;
    }

    /* ── submit button ── */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }

    .submit-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(91, 71, 224, 0.30);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    /* ── divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--hint);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border-md);
    }

    /* ── google button ── */
    .google-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      border: 1px solid var(--border-md);
      border-radius: 99px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
    }

    .google-btn:hover {
      background: var(--bg);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .google-icon {
      width: 18px;
      height: 18px;
    }

    /* ── footer link ── */
    .footer-link {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .footer-link a:hover {
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-dot">
        <svg viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
      </div>
      <span class="brand-name">my notes</span>
    </div>

    <!-- Heading -->
    <h1 class="heading">welcome back</h1>
    <p class="subheading">sign in to your notes</p>

    <!-- Form -->
    <div class="form-group">
      <label for="email">email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label for="password">password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <div class="forgot">
      <a href="#">forgot password?</a>
    </div>

    <button class="submit-btn" onclick="handleLogin()">sign in</button>

    <div class="divider">or</div>

    <!-- Google button -->
    <button class="google-btn">
      <!-- Google logo SVG -->
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          fill="#4285F4" />
        <path
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          fill="#34A853" />
        <path
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
          fill="#FBBC05" />
        <path
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          fill="#EA4335" />
      </svg>
      continue with google
    </button>

    <p class="footer-link">
      don't have an account? <a href="signup.html">sign up</a>
    </p>

  </div>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) {
        alert('Please fill in all fields.');
        return;
      }
     const response = await axios.post('http://localhost:8080/login', {
        uemail: email,
        upassword: password
      })
      const token = response.data.token;
      localStorage.setItem('token', token);
      alert('login success redirecting to dashboard...')

      window.location.href = './';
    }

    // Enter key submits
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>

</html>
